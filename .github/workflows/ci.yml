name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Compile C engine to WebAssembly ─────────────────────────────
  build-engine:
    name: Build Engine (C → WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bison and Flex
        run: sudo apt-get install -y bison flex

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Pre-generate grammar.c and lexanal.c
        working-directory: engine
        run: |
          bison -d -o src/grammar.c src/grammar.y
          flex -o src/lexanal.c src/lexanal.l

      - name: Build WASM
        working-directory: engine
        run: make wasm

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: engine-wasm
          path: |
            engine/build/engine.wasm
            engine/build/engine.js

  # ── Job 2: Build Vite frontend (depends on WASM) ───────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: build-engine
    steps:
      - uses: actions/checkout@v4

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: engine-wasm
          path: frontend/public

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  # ── Job 3: Deploy to GitHub Pages (main branch only) ───────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./dist

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
