<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CROBOTS</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: auto;
        background: #080818;
        font-family: 'Courier New', monospace;
      }
      /* Centering shell — column layout: canvas on top, controls below */
      #app {
        min-width: 100%;
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 8px 0;
      }
      /* Square canvas wrapper sized by JS */
      #canvas-wrapper {
        position: relative;
        flex-shrink: 0;
      }
      #battle-canvas {
        display: block;
      }
      #upload-container {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
        pointer-events: none;
      }
      #upload-container > * {
        pointer-events: auto;
      }
      /* Controls sit below the canvas, not overlaid on it */
      #controls-container {
        width: 100%;
        flex-shrink: 0;
        z-index: 10;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="canvas-wrapper">
        <canvas id="battle-canvas"></canvas>
        <div id="upload-container"></div>
      </div>
      <div id="controls-container"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
